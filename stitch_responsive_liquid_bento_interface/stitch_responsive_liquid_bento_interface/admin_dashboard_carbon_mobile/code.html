<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            overscroll-behavior-y: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            border-right: 1px solid rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.4);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease-out;
        }

        .glass-button:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Hide scrollbar for clean mobile look */
        ::-webkit-scrollbar {
            display: none;
        }
        
        /* Entry Animations */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .stagger-1 { animation: fadeSlideUp 0.4s ease-out 0.1s both; }
        .stagger-2 { animation: fadeSlideUp 0.4s ease-out 0.25s both; }
        .stagger-3 { animation: fadeSlideUp 0.4s ease-out 0.4s both; }
        .stagger-4 { animation: fadeSlideUp 0.4s ease-out 0.55s both; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="flex flex-col h-screen overflow-hidden">
<!-- TopNavBar (Mobile Shell) -->
<header class="flex justify-between items-center w-full px-margin-sm h-16 sticky top-0 z-40 bg-[#171717]/60 backdrop-blur-lg border-b border-white/5 shadow-sm transition-colors">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden border border-white/10">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A highly detailed close-up portrait of a professional tailor in a modern workshop, lit by cinematic studio lights. Deep shadows and cool blue-toned highlights reflect a premium, technical aesthetic, perfectly framing the subject against a sleek, dark background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDPWBdgAkBluVWN9PTGq8iqov7YHezACsn-rb6OpqV7WPl0Eb_wfb2ZBSuGd87p0c69oAKmqQB5hkY6hOO9BahxaJrcG4-npH2bNQHbaWaec0soTkoiY9qcR3n5Hnm02DC27aD1HfTTNNiLH4UROKpIr8r5pIgIIm9ekb5qOqYRIQ_Y37sCXcTik0baFp_NpaQJHWaLsRSh_yj0YTgVX7UmmUxhM5PgIIpTWr6ADvVBEJKKZ-DWrkLN"/>
</div>
<span class="font-headline-lg-mobile text-headline-lg-mobile font-semibold text-primary">SFA Tailoring</span>
</div>
<div class="flex items-center gap-2">
<button aria-label="Notifications" class="w-10 h-10 flex items-center justify-center rounded-full glass-button text-on-surface-variant hover:text-primary transition-colors Active: opacity-80">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<!-- Main Canvas (Bento Grid 1-Col Mobile) -->
<main class="flex-1 overflow-y-auto px-margin-sm pt-bento-gap pb-24 space-y-bento-gap">
<!-- Priority Stats Row -->
<div class="grid grid-cols-2 gap-bento-gap stagger-1">
<!-- Active Orders -->
<div class="glass-panel rounded-xl p-4 flex flex-col justify-between h-32 active:scale-[0.98] transition-transform">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-secondary" data-icon="reorder" style="font-variation-settings: 'FILL' 1;">reorder</span>
<span class="bg-secondary/10 text-secondary font-label-caps text-label-caps px-2 py-1 rounded-full border border-secondary/20">+3 New</span>
</div>
<div>
<div class="font-display-lg text-display-lg text-on-surface">24</div>
<div class="font-body-sm text-body-sm text-on-surface-variant">Active Orders</div>
</div>
</div>
<!-- Tasks -->
<div class="glass-panel rounded-xl p-4 flex flex-col justify-between h-32 active:scale-[0.98] transition-transform">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-tertiary" data-icon="assignment" style="font-variation-settings: 'FILL' 1;">assignment</span>

</div>
</div>
</div>
<!-- Quick Actions Bento -->
<div class="glass-panel rounded-xl p-5 stagger-2">

<div class="grid grid-cols-4 gap-4">
<button class="flex flex-col items-center gap-2 active:scale-95 transition-transform">
<div class="w-12 h-12 rounded-full bg-primary/10 border border-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="add">add</span>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">New Order</span>
</button>
<button class="flex flex-col items-center gap-2 active:scale-95 transition-transform">
<div class="w-12 h-12 rounded-full bg-surface-bright/20 border border-white/10 flex items-center justify-center text-on-surface hover:bg-surface-bright/40 transition-colors">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">Scan</span>
</button>
<button class="flex flex-col items-center gap-2 active:scale-95 transition-transform">
<div class="w-12 h-12 rounded-full bg-surface-bright/20 border border-white/10 flex items-center justify-center text-on-surface hover:bg-surface-bright/40 transition-colors">
<span class="material-symbols-outlined" data-icon="styler">styler</span>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">Patterns</span>
</button>
<button class="flex flex-col items-center gap-2 active:scale-95 transition-transform">

</div>

<h2 class="font-title-md text-title-md text-on-surface">Recent Activity</h2>
<button class="text-primary font-body-sm text-body-sm hover:underline">View All</button>
</div>
<div class="space-y-4">
<!-- Activity Item 1 -->
<div class="flex items-start gap-3 p-3 rounded-lg hover:bg-white/5 transition-colors active:bg-white/10">
<div class="w-10 h-10 rounded-full bg-secondary/10 flex items-center justify-center text-secondary shrink-0 border border-secondary/20">
<span class="material-symbols-outlined" data-icon="cut">cut</span>
</div>

</div>

<!-- Activity Item 3 -->
<div class="flex items-start gap-3 p-3 rounded-lg hover:bg-white/5 transition-colors active:bg-white/10">
<div class="w-10 h-10 rounded-full bg-error/10 flex items-center justify-center text-error shrink-0 border border-error/20">
<span class="material-symbols-outlined" data-icon="warning">warning</span>
</div>
<div class="flex-1 min-w-0">
<p class="font-body-sm text-body-sm text-on-surface truncate">Fabric Shortage Alert: Silk</p>
<p class="font-label-caps text-label-caps text-on-surface-variant mt-1">2 hrs ago • Inventory</p>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Shell) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex lg:hidden justify-around items-center px-4 py-2 bg-[#171717]/80 backdrop-blur-2xl docked full-width bottom-0 rounded-t-xl border-t border-white/5 shadow-[0_-4px_24px_rgba(0,0,0,0.5)]">
<!-- Active Tab: Home -->
<button class="flex flex-col items-center justify-center bg-primary/20 text-primary border border-primary/20 rounded-xl px-4 py-1.5 font-label-caps text-label-caps active:bg-primary/30 tap-highlight-transparent transition-all">
<span class="material-symbols-outlined" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="mt-1">Home</span>
</button>
<!-- Inactive Tab: Orders -->
<button class="flex flex-col items-center justify-center text-on-surface-variant font-label-caps text-label-caps active:bg-white/5 tap-highlight-transparent rounded-xl px-4 py-1.5 transition-all hover:text-on-surface">
<span class="material-symbols-outlined" data-icon="reorder">reorder</span>
<span class="mt-1">Orders</span>
</button>
<!-- Inactive Tab: Tasks -->

<span class="material-symbols-outlined" data-icon="assignment">assignment</span>
<span class="mt-1">Tasks</span>
</button>
<!-- Inactive Tab: Profile -->
<button class="flex flex-col items-center justify-center text-on-surface-variant font-label-caps text-label-caps active:bg-white/5 tap-highlight-transparent rounded-xl px-4 py-1.5 transition-all hover:text-on-surface">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="mt-1">Profile</span>
</button>
</nav>
<script>
        // Micro-interactions for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'scale(0.95)';
            }, {passive: true});
            
            btn.addEventListener('touchend', () => {
                btn.style.transform = 'scale(1)';
            }, {passive: true});
            
            btn.addEventListener('touchcancel', () => {
                btn.style.transform = 'scale(1)';
            }, {passive: true});
        });
    </script>
